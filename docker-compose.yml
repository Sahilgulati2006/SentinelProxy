services:
  redis:
    image: redis:7-alpine
    container_name: sentinelproxy-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentinelproxy-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
      - ./sentinelproxy.db:/app/sentinelproxy.db

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sentinelproxy-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    depends_on:
      - backend
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  redis_data: